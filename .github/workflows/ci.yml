name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          playwright install chromium

      - name: Run pytest
        run: |
          source venv/bin/activate
          python3 -m pytest tests/unit/ -v --tb=short --cov=app --cov=core --cov-report=term --ignore=tests/unit/core/test_playwright_manager.py -x -q 2>&1 | tail -30

      # PostgreSQL for E2E tests
      - name: Start PostgreSQL
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql postgresql-client
          echo "port = 15435" | sudo tee -a /etc/postgresql/*/main/postgresql.conf
          sudo pg_ctlcluster * main start || sudo service postgresql start
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres'"
          sudo -u postgres psql -c "CREATE DATABASE uitest_e2e"
          sudo -u postgres psql -c "CREATE DATABASE uitest_e2e_webui"
          echo "PG ready on port 15435"

      # E2E 测试：自启动 uvicorn 子进程 + 真实 Playwright 浏览器
      # 需要先构建前端，否则 SPA 静态资源缺失，登录页会白屏
      - name: Set up Node.js 20 (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Run E2E tests
        run: |
          source venv/bin/activate
          python3 -m pytest tests/e2e/ -v -m e2e --timeout=120
        timeout-minutes: 15
        env:
          CI: "true"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint check
        run: npm run eslint 2>&1 || true

      - name: Build
        run: npm run build
